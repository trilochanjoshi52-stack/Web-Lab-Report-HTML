<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Formatting Tags</title>
</head>
<body>
    <b>Bold text</b><br>
<strong>Strong text</strong><br>

<i>Italic text</i><br>
<em>Emphasized text</em><br>

<q>This is quoted text</q><br>

<blockquote>
This is blockquote text displayed as a block.
</blockquote>

<del>Deleted text</del><br>
<ins>Inserted text</ins><br>

<font color="red" size="4">Font tag text</font><br>

<pre>
Preformatted text
    keeps spaces
    and line breaks
</pre>

<code>printf("Hello World");</code><br>

<tt>Teletype text</tt><br>

HTML Entities: &lt; &gt; &amp; &copy;<br>

H<sub>2</sub>O <br>
x<sup>2</sup> + y<sup>2</sup>

</body>
</html>
